name: windows-build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore .\Lumina.sln

      - name: Build solution
        run: dotnet build .\Lumina.sln --configuration Release --no-restore

      - name: Publish Windows host
        run: dotnet publish .\src\Lumina.Host\Lumina.Host.csproj --configuration Release --runtime win-x64 --self-contained true --output .\artifacts\Lumina.Host

      - name: Create ZIP package
        shell: pwsh
        run: Compress-Archive -Path .\artifacts\Lumina.Host\* -DestinationPath .\artifacts\lumina-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-windows
          path: .\artifacts\lumina-windows.zip
