name: windows-release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag name
        required: true
        default: v0.1.0

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore .\Lumina.sln

      - name: Build solution
        run: dotnet build .\Lumina.sln --configuration Release --no-restore

      - name: Publish Windows host
        run: dotnet publish .\src\Lumina.Host\Lumina.Host.csproj --configuration Release --output .\artifacts\Lumina.Host --no-build

      - name: Create release ZIP
        shell: pwsh
        run: Compress-Archive -Path .\artifacts\Lumina.Host\* -DestinationPath .\artifacts\lumina-windows-${{ github.event.inputs.tag_name }}.zip -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: Lumina ${{ github.event.inputs.tag_name }}
          files: .\artifacts\lumina-windows-${{ github.event.inputs.tag_name }}.zip
